server:
  port: 8083

spring:
  application:
    name: daman-admin-backend

  datasource:
    url: jdbc:h2:file:${user.home}/.daman/admin/admin_data;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

daman:
  workspace: ${DAMAN_WORKSPACE:D:/Daman/src}
  admin:
    # Only used the very first time the app runs (admin_users table is empty) to
    # seed the single admin login row — see AdminUserSeeder. Has no effect once
    # that row exists; change the password by updating admin_users.password_hash
    # directly (bcrypt) instead.
    seed-username: ${DAMAN_ADMIN_USERNAME:admin}
    seed-password: ${DAMAN_ADMIN_PASSWORD:ChangeMe123!}
