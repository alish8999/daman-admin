@if (translationService.getLanguage$() | async) {
  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">{{ 'appTitle' | t }}</span>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <a routerLink="/clients" routerLinkActive="text-white" class="nav-link text-secondary">{{ 'navClients' | t }}</a>
      <a routerLink="/packages" routerLinkActive="text-white" class="nav-link text-secondary">{{ 'navPackages' | t }}</a>
      <a routerLink="/licenses" routerLinkActive="text-white" class="nav-link text-secondary">{{ 'navLicenses' | t }}</a>
      <a routerLink="/versions" routerLinkActive="text-white" class="nav-link text-secondary">{{ 'navVersions' | t }}</a>
      <div class="btn-group btn-group-sm" role="group">
        <button type="button" class="btn btn-outline-light" [class.active]="isActiveLang('en')" (click)="setLanguage('en')">{{ 'langEn' | t }}</button>
        <button type="button" class="btn btn-outline-light" [class.active]="isActiveLang('ar')" (click)="setLanguage('ar')">{{ 'langAr' | t }}</button>
      </div>
    </div>
  </nav>
}

<router-outlet></router-outlet>
