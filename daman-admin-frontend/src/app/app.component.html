@if (translationService.getLanguage$() | async) {
  @if (showShell) {
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <div class="admin-sidebar-brand">
          <span class="admin-sidebar-mark">D</span>
          <span>{{ 'appTitle' | t }}</span>
        </div>

        <nav class="admin-sidebar-nav">
          <a routerLink="/dashboard" routerLinkActive="admin-sidebar-link--active" class="admin-sidebar-link">
            <i class="bi bi-grid-1x2-fill"></i>{{ 'navDashboard' | t }}
          </a>
          <a routerLink="/clients" routerLinkActive="admin-sidebar-link--active" class="admin-sidebar-link">
            <i class="bi bi-people-fill"></i>{{ 'navClients' | t }}
          </a>
          <a routerLink="/versions" routerLinkActive="admin-sidebar-link--active" class="admin-sidebar-link">
            <i class="bi bi-box-seam"></i>{{ 'navVersions' | t }}
          </a>
        </nav>

        <div class="admin-sidebar-footer">
          <div class="admin-lang-toggle">
            <button type="button" [class.active]="isActiveLang('en')" (click)="setLanguage('en')">{{ 'langEn' | t }}</button>
            <button type="button" [class.active]="isActiveLang('ar')" (click)="setLanguage('ar')">{{ 'langAr' | t }}</button>
          </div>
          <button type="button" class="admin-logout-btn" (click)="logout()" [title]="'logout' | t">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </div>
      </aside>

      <div class="admin-content">
        <router-outlet></router-outlet>
      </div>
    </div>
  } @else {
    <router-outlet></router-outlet>
  }
}
